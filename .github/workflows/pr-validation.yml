name: PR Validation

on:
  pull_request:
    branches:
      - main

# Cancel in-progress runs when a new workflow with the same group name is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write  # For SARIF upload

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon --stacktrace

      - name: Run detekt
        run: ./gradlew detekt --no-daemon --stacktrace

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Fix SARIF file for GitHub Code Scanning
        if: always()
        run: |
          SARIF_FILE="app/build/reports/lint-results-debug.sarif"
          if [ -f "$SARIF_FILE" ]; then
            # Fix column numbers: replace "startColumn": 0 with "startColumn": 1
            # and "endColumn": 0 with "endColumn": 1
            sed -i.bak 's/"startColumn": 0/"startColumn": 1/g' "$SARIF_FILE"
            sed -i.bak 's/"endColumn": 0/"endColumn": 1/g' "$SARIF_FILE"
            rm -f "${SARIF_FILE}.bak"
            echo "Fixed SARIF column numbers"
          else
            echo "SARIF file not found, skipping fix"
          fi

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/ktlint/
            app/build/reports/detekt/
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.sarif
          if-no-files-found: warn

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint

      - name: Comment lint results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            let lintStatus = '✅ All lint checks passed';
            if ('${{ job.status }}' === 'failure') {
              lintStatus = '❌ Lint checks failed';
            }

            const comment = `### ${lintStatus}

            **Checks run:**
            - ktlint (formatting)
            - detekt (static analysis)
            - Android Lint (platform checks)

            <details>
            <summary>View Reports</summary>

            Lint report artifacts are available for download in the workflow run.
            SARIF results are uploaded to the Security tab.

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/test-results/testDebugUnitTest/
            app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn

      - name: Comment test results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            let testStatus = '✅ Unit tests passed';
            if ('${{ job.status }}' === 'failure') {
              testStatus = '❌ Unit tests failed';
            }

            const comment = `### ${testStatus}

            <details>
            <summary>Test Report</summary>

            Test report artifact is available for download in the workflow run.

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Comment build results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const apkPath = 'app/build/outputs/apk/debug/app-debug.apk';

            let buildStatus = '✅ Debug APK built successfully';
            let apkInfo = '';

            if ('${{ job.status }}' === 'failure') {
              buildStatus = '❌ Debug APK build failed';
            } else {
              try {
                const stats = fs.statSync(apkPath);
                const sizeMB = (stats.size / (1024 * 1024)).toFixed(2);
                apkInfo = `\n\n📦 APK size: ${sizeMB} MB`;
              } catch (error) {
                apkInfo = '\n\n⚠️ Could not determine APK size';
              }
            }

            const comment = `### ${buildStatus}${apkInfo}

            <details>
            <summary>Download APK</summary>

            The debug APK artifact is available for download in the workflow run.
            [View workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
